name: Build Android v0.8.1

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      # Step 1: Redirect GitHub runner logging space BEFORE it can overflow
      # This links the restricted diagnostic directory to the massive /tmp system partition
      - name: Prevent Runner Agent Log Overflow
        run: |
          sudo mkdir -p /tmp/_diag_logs
          sudo mkdir -p /home/runner/actions-runner/cached/2.335.1/
          sudo ln -s /tmp/_diag_logs /home/runner/actions-runner/cached/2.335.1/_diag || true

      # Step 2: Safe repository checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 3: Fast manual space reclamation (No risky drive re-partitioning needed)
      - name: Targeted Space Optimization
        run: |
          sudo rm -rf /usr/local/lib/android # Wipes pre-installed Android SDK bloat (~15GB)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      # Step 4: Recreate empty NDK placeholder folder for EAS static validations
      - name: Recreate Android NDK Base Directory
        run: |
          sudo mkdir -p /usr/local/lib/android/sdk/ndk/27.3.13750724
          sudo chmod -R 777 /usr/local/lib/android

      # Step 5: Setup standard tools
      - name: Setup Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Global Yarn
        run: sudo npm install -g yarn

      - name: Setup Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Step 6: Package installation
      - name: Install dependencies
        run: npm install

      - name: Setup Expo CLI & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 21.x
          token: ${{ secrets.EXPO_TOKEN }}

      # Step 7: Apply strict memory limits to the Gradle compiler
      - name: Configure Production Gradle Options
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          echo "org.gradle.vfs.watch=false" >> android/gradle.properties

      # Step 8: Build with strict inline memory arguments to prevent daemon OOM crashes
      - name: Local EAS Build
        run: |
          eas build --local --non-interactive --platform android --profile preview \
            --gradle-args "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"


      # Step 9: Save the compilation output
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "android/app/build/outputs/apk/**/*.apk"
