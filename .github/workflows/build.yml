name: Build Android v0.4

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'false' # Keeps essential Android SDK tools but frees space elsewhere
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Additional Targeted Cleanup
        run: |
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android/sdk/ndk # Wipes heavy NDK files Expo builds don't need
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Setup Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Automates local npm registry caching

      - name: Setup Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Install dependencies (utilizes npm cache layer configured above)
      - name: Install dependencies
        run: npm install

      - name: Setup Expo CLI & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 21.x
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Limit Gradle Memory Allocation
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx2548m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties

      - name: Local EAS Build
        run: eas build --local --non-interactive --platform android --profile preview
        env:
          EAS_BUILD_VERBOSE: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "android/app/build/outputs/apk/**/*.apk"
