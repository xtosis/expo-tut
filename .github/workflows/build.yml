name: Build Android v0.7

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      # Step 1: Maximize build space with a massive 16GB safety buffer on the root partition
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384 # Drastically increased to prevent the runner agent from running out of log space
          swap-size-mb: 2048     # Slightly increased swap to help handle Gradle memory surges
          remove-dotnet: 'true'
          remove-android: 'true' # Wipes massive unneeded SDK pieces to maximize raw storage
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # Step 2: Restore the exact empty NDK folder structure that EAS checks for
      - name: Recreate Android NDK Base Directory
        run: |
          sudo mkdir -p /usr/local/lib/android/sdk/ndk/27.3.13750724
          sudo chmod -R 777 /usr/local/lib/android/sdk

      # Step 3: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 4: Aggressive targeted cleanup of hidden Linux desktop tool bloat
      - name: Additional Targeted Cleanup
        run: |
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      # Step 5: Setup Node.js (Aligned to standard Node 24 execution)
      - name: Setup Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # Step 6: Explicitly restore global Yarn binary for Expo CLI installation
      - name: Install Global Yarn
        run: sudo npm install -g yarn

      # Step 7: Setup Java
      - name: Setup Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Step 8: Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm install

      # Step 9: Setup Expo CLI & EAS CLI
      - name: Setup Expo CLI & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 21.x
          token: ${{ secrets.EXPO_TOKEN }}

      # Step 10: Enforce strict constraints on local Gradle builds to prevent cache inflation
      - name: Configure Production Gradle Options
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          echo "org.gradle.vfs.watch=false" >> android/gradle.properties

      # Step 11: Execute local EAS build
      - name: Local EAS Build
        run: eas build --local --non-interactive --platform android --profile preview
        env:
          EAS_BUILD_VERBOSE: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"

      # Step 12: Upload Generated Build Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "android/app/build/outputs/apk/**/*.apk"
